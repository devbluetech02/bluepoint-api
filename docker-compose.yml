# =====================================================
# BluePoint API - Docker Compose
# =====================================================

services:
  # =====================================================
  # API Next.js
  # =====================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bluepoint-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      # Database (PostgreSQL vetorizado no host 10.1.3.216)
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5437}
      - DB_USERNAME=${DB_USERNAME:-bluepoint}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE:-bluepoint_vector}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1h}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      # Email/SMTP
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      # MinIO (Externo)
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-10.1.3.216}
      - MINIO_PORT=${MINIO_PORT:-9100}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-local-minio-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-local-minio-secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-bluepoint}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      # Redis (cache próprio do stack)
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # Face Service (microserviço Python)
      - FACE_SERVICE_URL=http://face-service:5000
      # Portal do Colaborador (ocorrências)
      - PORTAL_COLABORADOR_URL=${PORTAL_COLABORADOR_URL:-http://portal-do-colaborador.bluetechfilms.com.br}
      - PORTAL_COLABORADOR_API_KEY=${PORTAL_COLABORADOR_API_KEY:-}
      # OneSignal (Push Notifications)
      - ONESIGNAL_APP_ID=${ONESIGNAL_APP_ID:-}
      - ONESIGNAL_REST_API_KEY=${ONESIGNAL_REST_API_KEY:-}
      - PUSH_ICON_URL=${PUSH_ICON_URL:-}
      - PUSH_SMALL_ICON=${PUSH_SMALL_ICON:-}
      # Gemini (IA)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # OpenRouter / extração NFe PDF (OPENAI_*)
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-google/gemini-2.0-flash-001}
    depends_on:
      redis:
        condition: service_started
      face-service:
        condition: service_healthy
    networks:
      - bluepoint-network
      - pgbouncer-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/v1/health').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =====================================================
  # Redis - Cache (próprio do BluePoint, usado pela API)
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: bluepoint-redis
    restart: unless-stopped
    # Porta 6379 só na rede interna (API acessa por REDIS_HOST=redis)
    command: redis-server
    volumes:
      - bluepoint-redis-data:/data
    networks:
      - bluepoint-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =====================================================
  # Face Recognition Service (InsightFace/ArcFace)
  # =====================================================
  face-service:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    container_name: bluepoint-face-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - bluepoint-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

# =====================================================
# Networks
# =====================================================
networks:
  bluepoint-network:
    driver: bridge
  pgbouncer-network:
    external: true
    name: portal_do_empregado_backend

# =====================================================
# Volumes (persistência do Redis)
# =====================================================
volumes:
  bluepoint-redis-data:
